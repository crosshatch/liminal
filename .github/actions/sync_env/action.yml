name: Sync Env
description: Push GitHub Actions environment secrets to a Cloudflare Worker via `liminal sync-env`. The typed Effect Config module decides which keys are read.
inputs:
  worker:
    description: Worker directory, relative to repo root.
    required: true
  config-file:
    description: Path to the typed Effect Config module, relative to repo root.
    required: true
  cloudflare-api-token:
    description: Cloudflare API token.
    required: true
  cloudflare-account-id:
    description: Cloudflare account ID.
    required: true
  secrets-json:
    description: JSON object of secrets, typically toJSON(secrets) from the caller.
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        ALL_SECRETS: ${{ inputs.secrets-json }}
        WORKER: ${{ inputs.worker }}
        CONFIG_FILE: ${{ inputs.config-file }}
      run: |
        eval "$(printf '%s' "$ALL_SECRETS" | jq -r 'to_entries[] | "export \(.key)=\(.value | @sh)"')"
        cd "$WORKER"
        pnpm exec liminal sync-env . "$GITHUB_WORKSPACE/$CONFIG_FILE"
